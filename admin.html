<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Training Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🔐 Admin Panel</div>
            <div class="nav-links">
                <span id="adminDisplay" class="user-display">Admin</span>
                <button id="backBtn" class="btn-secondary">← Back to Hub</button>
                <button id="logoutAdminBtn" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1>Create New Resource Post</h1>
            <p>Add training materials and reference links for the community</p>
        </div>

        <div class="admin-content">
            <div class="admin-form-section">
                <form id="postForm" class="post-form">
                    <div class="form-group">
                        <label>Post Title *</label>
                        <input type="text" id="postTitle" placeholder="Enter post title" 
                               required maxlength="100">
                        <small id="titleCount">0/100</small>
                    </div>

                    <div class="form-group">
                        <label>Description *</label>
                        <textarea id="postDescription" placeholder="Detailed description..." 
                                  required maxlength="1000"></textarea>
                        <small id="descCount">0/1000</small>
                    </div>

                    <div class="form-group">
                        <label>Link/URL *</label>
                        <input type="url" id="postLink" placeholder="https://example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Categories/Tags *</label>
                        <div class="tag-selector" id="tagSelector">
                            <div class="tag-input">
                                <input type="text" id="tagInput" placeholder="Type and press Enter...">
                                <button type="button" class="btn-add-tag">+ Add</button>
                            </div>
                            <div class="tags-display" id="tagsDisplay"></div>
                        </div>
                        <div class="suggested-tags" id="suggestedTags"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary btn-large">📤 Publish Post</button>
                        <button type="reset" class="btn-secondary btn-large">Clear Form</button>
                    </div>
                </form>
            </div>

            <div class="admin-preview-section">
                <h3>Preview</h3>
                <div class="preview-card" id="previewCard">
                    <div class="preview-placeholder">Preview will appear here...</div>
                </div>
            </div>
        </div>

        <!-- Posts Management Table -->
        <div class="admin-posts-section">
            <h2>Recent Posts</h2>
            <div class="posts-table-wrapper">
                <table class="posts-table" id="postsTable">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Tags</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="postsTableBody"></tbody>
                </table>
            </div>
            <div id="noPostsMsg" class="empty-msg" style="display:none;">
                No posts yet. Create your first post above!
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="admin-script.js"></script>
</body>
</html>
