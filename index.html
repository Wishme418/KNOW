<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Hub - Resource Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📚 Training Hub</div>
            <div class="nav-links">
                <span id="userDisplay" class="user-display">Guest</span>
                <button id="adminBtn" class="btn-admin" style="display:none;">Admin Panel</button>
                <button id="logoutBtn" class="btn-logout" style="display:none;">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1 class="main-title">📖 Learning Resources</h1>
            <p class="subtitle">Curated training materials and reference links</p>
        </div>

        <div class="filter-section">
            <div class="filter-wrapper">
                <input type="text" id="searchInput" class="search-box" 
                       placeholder="🔍 Search posts...">
                <div class="category-filters" id="categoryFilters"></div>
            </div>
            <div class="view-toggle">
                <button class="view-btn active" data-view="grid">⊞ Grid</button>
                <button class="view-btn" data-view="list">≡ List</button>
            </div>
        </div>

        <div class="stats-bar">
            <span id="postCount">0 Resources</span>
            <span id="activeFilter"></span>
        </div>

        <div class="posts-grid" id="postsGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📭</div>
            <h2>No Resources Found</h2>
            <p>Try adjusting your filters or check back soon.</p>
        </div>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>
            
            <div id="login-tab" class="tab-content active">
                <form id="loginForm">
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
            </div>
            
            <div id="register-tab" class="tab-content">
                <form id="registerForm">
                    <input type="text" placeholder="Username" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
